<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body class="{{ page.body_class }}">
  {% include header.html %}

  <main class="page {% if page.has_toc %}page--with-toc{% endif %}">
    <article class="prose">
      {{ content }}
    </article>

    {% if page.has_toc %}
      <aside class="toc" aria-label="On this page">
        <nav id="toc-nav"></nav>
      </aside>
    {% endif %}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
