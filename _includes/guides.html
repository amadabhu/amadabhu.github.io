<ul class="guide-list">
{%- for g in site.quick_reference_guides_files -%}
  <li class="guide-card">
    <div class="guide-card__preview">
      <iframe src="{{ g.url }}#toolbar=0&navpanes=0&view=FitH"
              title="{{ g.name }} preview"
              loading="lazy"></iframe>
    </div>
    <div class="guide-card__meta">
      <h3 class="guide-card__name">{{ g.name }}</h3>
      <span class="guide-card__size">{{ g.ext | upcase }} · {{ g.size_label }}</span>
    </div>
    <a class="guide-card__download" href="{{ g.url }}" download="{{ g.filename }}">Download&nbsp;↓</a>
  </li>
{%- endfor -%}
</ul>
